<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cats Arcade</title>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>The Cats Arcade</h1>
</header>

<!-- CALCULATOR LOCK -->
<div id="calcLock">
  <h2>Calculator</h2>
  <input id="calcDisplay" value="0" readonly>

  <div class="calcGrid">
    <button onclick="calcClear()">C</button>
    <button onclick="calcInput('/')">÷</button>
    <button onclick="calcInput('*')">×</button>
    <button onclick="calcInput('-')">−</button>

    <button onclick="calcInput('7')">7</button>
    <button onclick="calcInput('8')">8</button>
    <button onclick="calcInput('9')">9</button>
    <button onclick="calcInput('+')">+</button>

    <button onclick="calcInput('4')">4</button>
    <button onclick="calcInput('5')">5</button>
    <button onclick="calcInput('6')">6</button>
    <button onclick="calcEnter()">=</button>

    <button onclick="calcInput('1')">1</button>
    <button onclick="calcInput('2')">2</button>
    <button onclick="calcInput('3')">3</button>

    <button class="zero" onclick="calcInput('0')">0</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Enter Password</h2>
  <form id="loginForm">
    <input type="password" id="sitePassword">
    <br><br>
    <button type="submit">Enter</button>
  </form>
  <p id="loginError"></p>
</div>

<!-- MAIN SITE -->
<div id="siteContent" style="display:none;">

  <!-- NAV -->
  <nav>
    <button onclick="showPage('gamesPage')">Home</button>
    <button onclick="showPage('moviesPage')">Movies</button> <!-- ✅ NEW -->
    <button onclick="showPage('chatPage')">Chat</button>
    <button onclick="showPage('donatePage')">Gifts</button>
    <button onclick="showPage('discordPage')">Discord</button>
    <button onclick="openByodLogin()">Dev Tools</button>
  </nav>

  <!-- HOME / GAMES -->
  <div id="gamesPage" class="page" style="display:none;">
    <input id="gameSearch" placeholder="Search..." oninput="searchGames()">
    <button onclick="randomGame()">Random</button>
    <div id="games"></div>
    <div id="player"><p>No game loaded.</p></div>
  </div>

  <!-- 🎬 MOVIES PAGE (NEW) -->
  <div id="moviesPage" class="page" style="display:none;">
    <h2>🎬 Movies and More!</h2>

    <p>Watch movies or listen to music:</p>

    <div style="margin-top:20px;">
      <button onclick="openSite('https://www.cineby.sc/')">
        🎥 Watch Movies
      </button>
    </div>

    <div style="margin-top:10px;">
      <button onclick="openSite('https://playlistsound.com/')">
        🎵 Listen to Music
      </button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatPage" class="page" style="display:none;">
    <div id="chatBox"></div>
    <input id="chatName" placeholder="Name">
    <input id="chatMessage" placeholder="Message">
    <button onclick="sendChat()">Send</button>
  </div>

  <!-- GIFTS -->
  <div id="donatePage" class="page" style="display:none;">
    <h2>🎁 Virtual Gift Cards</h2>
    <input id="giftName" placeholder="Your name">
    <textarea id="giftCode" placeholder="Amazon - XXXX"></textarea>
    <button onclick="submitGift()">Submit</button>
    <div id="giftList"></div>
  </div>

  <!-- DISCORD -->
  <div id="discordPage" class="page" style="display:none;">
    <h2>Join our Discord!</h2>
    <a href="https://discord.gg/rZqvejPRvx" target="_blank">Join Discord</a>
  </div>

  <!-- DEV TOOLS -->
  <div id="byodLogin" style="display:none;">
    <h2>Developer Tools</h2>
    <input type="password" id="byodPass" placeholder="Enter password">
    <br><br>
    <button onclick="checkByodPass()">Enter</button>
    <p id="byodError"></p>
  </div>

  <div id="byodPanel" style="display:none;">
    <h2>BYOD Panel</h2>
    <button onclick="launchByod()">Launch BYOD Site</button>
  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
