<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Cats Arcade</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Enter Password</h2>

<form id="loginForm">

<input type="password" id="sitePassword" placeholder="Password">

<br><br>

<button type="submit">Enter</button>

</form>

<p id="loginError"></p>

</div>


<!-- MAIN SITE -->

<div id="siteContent" style="display:none">

<header>

<h1>The Cats Arcade</h1>

<p>Play unblocked games anytime.</p>

<p id="playerCounter">Players Online: 0</p>

</header>


<!-- NAVIGATION -->

<nav>

<button onclick="showPage('gamesPage')">Home</button>
<button onclick="showPage('settingsPage')">Settings</button>
<button onclick="showPage('requestPage')">Requests</button>
<button onclick="showPage('chatPage')">Chat</button>
<button onclick="showPage('donatePage')">Donate</button>

</nav>


<main>

<!-- GAMES -->

<div id="gamesPage" class="page">

<section class="card">

<h2>Games</h2>

<input id="gameSearch" placeholder="Search games..." oninput="searchGames()">

<br><br>

<button onclick="randomGame()">Random Game</button>

<br><br>

<div id="games"></div>

</section>


<section class="card">

<h2>Play Area</h2>

<div id="player">

<p>No game loaded.</p>

</div>

</section>

</div>


<!-- SETTINGS -->

<div id="settingsPage" class="page">

<section class="card">

<h2>Settings</h2>

<p>Background Color</p>

<input type="color" id="bgColor">

<br><br>

<p>Panic Website</p>

<input id="panicInput">

<br><br>

<button onclick="toggleDarkMode()">Toggle Dark Mode</button>

<br><br>

<button onclick="saveSettings()">Save Settings</button>
<button onclick="savePanic()">Save Panic Site</button>

</section>

</div>


<!-- REQUESTS -->

<div id="requestPage" class="page">

<section class="card">

<h2>Game Requests</h2>

<input id="reqName" placeholder="Your name">

<br><br>

<textarea id="reqGames"></textarea>

<br><br>

<button onclick="submitRequest()">Submit Request</button>

</section>

</div>


<!-- CHAT -->

<div id="chatPage" class="page">

<section class="card">

<h2>Chat</h2>

<div id="chatBox"></div>

<br>

<input id="chatName" placeholder="Name">

<br><br>

<input id="chatMessage" placeholder="Message">

<br><br>

<button onclick="sendChat()">Send</button>

</section>

</div>


<!-- DONATE -->

<div id="donatePage" class="page">

<section class="card">

<h2>Support Cats Arcade</h2>

<button onclick="openDonate()">Donate</button>

</section>

</div>


<!-- DEV PANEL -->

<div id="devPage" class="page">

<section class="card">

<h2>Developer Panel</h2>

<button onclick="showPage('gamesPage')">Return</button>

<hr>

<p>Games Loaded: <span id="devGameCount">0</span></p>
<p>Chat Messages: <span id="devChatCount">0</span></p>
<p>Requests: <span id="devRequestCount">0</span></p>

<hr>

<button onclick="reloadGames()">Reload Games</button>
<button onclick="addGameDev()">Add Game</button>
<button onclick="removeLastGame()">Remove Last Game</button>

<hr>

<button onclick="viewRequests()">View Requests</button>

<hr>

<button onclick="testGame()">Test Game URL</button>

</section>

</div>

</main>

</div>

<div id="notifContainer"></div>

<script src="js/app.js"></script>

</body>
</html>
