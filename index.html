<!DOCTYPE html>
<html>

<head>

<title>Learning Portal</title>
<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Enter Password</h2>

<input type="password" id="sitePassword" placeholder="Password">
<br><br>

<button onclick="checkSitePassword()">Enter</button>

<p id="loginError"></p>

</div>


<div id="siteContent" style="display:none">

<header>

<h1>The Cats Arcade</h1>
<p>Click play to start a game</p>

</header>

<nav>

<button onclick="showPage('gamesPage')">Games</button>
<button onclick="showPage('requestPage')">Requests</button>

</nav>


<!-- HOME -->

<div id="gamesPage" class="page">

<section class="card">

<h2>Latest Updates</h2>

<ul id="updateList"></ul>

</section>

<section class="card">

<h2>Available Games</h2>

<div id="games"></div>

</section>

<section class="card">

<h2>Play Area</h2>

<div id="player">

<p>No game loaded</p>

</div>

</section>

</div>


<!-- REQUEST PAGE -->

<div id="requestPage" class="page">

<section class="card">

<h2>Game Request</h2>

<input id="reqName"
placeholder="1. What's your name? (If you don't have one say no) Example: Alex">

<br><br>

<textarea id="reqGames"
placeholder="2. What games do you want? (If you don't have any say no) Example: Run 3, Retro Bowl"></textarea>

<br><br>

<textarea id="reqIdeas"
placeholder="3. What else should we add? (If none say no) Example: Background settings"></textarea>

<br><br>

<textarea id="reqBug"
placeholder="4. What bug do you want to report? (If none say no) Example: Game not loading"></textarea>

<br><br>

<button onclick="submitRequest()">Submit</button>

</section>

</div>


<!-- DEV PAGE -->

<div id="devPage" class="page">

<section class="card">

<h2>Developer Dashboard</h2>

<p>Total Visitors: <span id="totalVisitors">0</span></p>

</section>

<section class="card">

<h2>Post Update</h2>

<input id="updateInput" placeholder="Example: Added Run 3">

<br><br>

<button onclick="addUpdate()">Post Update</button>

</section>

<section class="card">

<h2>Requests</h2>

<ul id="devRequests"></ul>

</section>

</div>


<button id="devBtn" onclick="devLogin()">Developer</button>

<script src="js/app.js"></script>

</body>
</html>
